<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Jnr. Structure Man</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --card:      #21263a;
      --border:    #2e3450;
      --orange:    #f5821f;
      --orange-dim:#7a3e0a;
      --green:     #22c55e;
      --green-dim: #14532d;
      --grey:      #94a3b8;
      --grey-dim:  #334155;
      --text:      #e8eaf0;
      --subtext:   #8892a4;
      --red:       #ef4444;
      --red-dim:   #3b0d0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--orange);
      padding: 14px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .header-left h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
    }
    .header-left h1 span { color: var(--orange); }
    .header-meta {
      font-size: 0.72rem;
      color: var(--subtext);
      margin-top: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #edit-toggle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 6px;
      border: 1.5px solid var(--orange);
      background: transparent;
      color: var(--orange);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      margin-top: 4px;
      white-space: nowrap;
    }
    #edit-toggle.done-mode {
      background: var(--orange);
      color: #fff;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      background: var(--surface);
      padding: 0 16px;
    }
    .tab-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 18px;
      border: none;
      background: none;
      color: var(--subtext);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── PROGRESS ── */
    .progress-wrap { padding: 14px 16px 4px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--orange); border-radius: 99px; transition: width 0.35s ease; }

    /* ── TAB CONTENT ── */
    .tab-content { display: none; padding: 0 16px; }
    .tab-content.active { display: block; }

    /* ── SECTION HEADING ROW ── */
    .section-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 18px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .section-label-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--orange);
      flex: 1;
    }

    /* ── ITEM ROW ── */
    .item-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 7px 0;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .item-row.done { border-color: var(--green-dim); }
    .item-row.na   { border-color: var(--grey-dim); }

    .item-main {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
    }
    .item-name {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1.3;
    }
    .item-row.done .item-name { color: var(--green); text-decoration: line-through; text-decoration-color: var(--green-dim); }
    .item-row.na   .item-name { color: var(--grey);  text-decoration: line-through; text-decoration-color: var(--grey-dim); }

    .answer-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .ans-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 5px 11px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      background: var(--surface);
      color: var(--subtext);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .ans-btn:hover { color: var(--text); border-color: var(--grey); }
    .ans-btn.yes.active { background: var(--green-dim); color: var(--green); border-color: var(--green); }
    .ans-btn.no.active  { background: var(--red-dim);   color: var(--red);   border-color: var(--red); }
    .ans-btn.na.active  { background: var(--grey-dim);  color: #e2e8f0;      border-color: var(--grey); }

    /* sub-items */
    .sub-items {
      border-top: 1px solid var(--border);
      padding: 8px 14px 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .sub-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      color: var(--subtext);
      padding-left: 16px;
    }
    .sub-item.done { color: var(--green); }
    .sub-item.na   { color: var(--grey); }
    .sub-item .sub-name { flex: 1; }
    .sub-item.done .sub-name { text-decoration: line-through; text-decoration-color: var(--green-dim); }
    .sub-item.na   .sub-name { text-decoration: line-through; text-decoration-color: var(--grey-dim); }

    .sub-ans-btns { display: flex; gap: 5px; }
    .sub-ans-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--surface);
      color: var(--subtext);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .sub-ans-btn:hover { color: var(--text); }
    .sub-ans-btn.yes.active { background: var(--green-dim); color: var(--green); border-color: var(--green); }
    .sub-ans-btn.no.active  { background: var(--red-dim);   color: var(--red);   border-color: var(--red); }
    .sub-ans-btn.na.active  { background: var(--grey-dim);  color: #e2e8f0;      border-color: var(--grey); }

    /* ── EDIT MODE ── */
    .delete-btn {
      display: none;
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 50%;
      background: var(--red);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .delete-btn:active { transform: scale(0.9); }

    body.edit-mode .delete-btn { display: flex; }
    body.edit-mode .answer-btns { display: none; }
    body.edit-mode .sub-ans-btns { display: none; }

    /* wiggle animation in edit mode */
    body.edit-mode .item-row {
      animation: wiggle 0.25s ease-in-out;
    }
    @keyframes wiggle {
      0%  { transform: rotate(0deg); }
      25% { transform: rotate(-0.8deg); }
      75% { transform: rotate(0.8deg); }
      100%{ transform: rotate(0deg); }
    }

    .edit-name-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--orange);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      padding: 4px 8px;
      outline: none;
    }

    /* add buttons shown only in edit mode */
    .add-btn {
      display: none;
      width: 100%;
      margin: 6px 0;
      padding: 9px;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      color: var(--subtext);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-btn:hover { border-color: var(--orange); color: var(--orange); }
    body.edit-mode .add-btn { display: block; }

    .add-sub-btn {
      display: none;
      margin: 6px 0 2px 16px;
      padding: 6px 10px;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 6px;
      color: var(--subtext);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-sub-btn:hover { border-color: var(--orange); color: var(--orange); }
    body.edit-mode .add-sub-btn { display: block; }

    .add-section-btn {
      display: none;
      width: 100%;
      margin: 14px 0 4px;
      padding: 9px;
      background: transparent;
      border: 1.5px dashed var(--orange-dim);
      border-radius: 8px;
      color: var(--orange);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .add-section-btn:hover { background: var(--orange-dim); }
    body.edit-mode .add-section-btn { display: block; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 20px 18px;
      width: 100%;
      max-width: 360px;
    }
    .modal h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--orange);
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .modal input {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--orange); }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .modal-confirm { background: var(--orange); color: #fff; }
    .modal-cancel  { background: var(--card); color: var(--subtext); border: 1.5px solid var(--border) !important; }

    /* ── RESET NOTICE ── */
    .reset-notice {
      text-align: center;
      font-size: 0.72rem;
      color: var(--subtext);
      padding: 22px 16px 0;
      letter-spacing: 0.04em;
    }
    .reset-notice strong { color: var(--orange); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Jnr. <span>Structure Man</span></h1>
    <div class="header-meta" id="dateLine">Loading…</div>
  </div>
  <button id="edit-toggle" onclick="toggleEditMode()">Edit</button>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('daily')">Daily</button>
  <button class="tab-btn"        onclick="switchTab('weekly')">Weekly</button>
</div>

<!-- ─────────── DAILY TAB ─────────── -->
<div id="tab-daily" class="tab-content active">
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="daily-progress-text">0 / 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="daily-progress-fill" style="width:0%"></div></div>
  </div>
  <div id="daily-list"></div>
  <button class="add-section-btn" onclick="promptAddSection('daily')">+ Add Section</button>
  <div class="reset-notice">Daily items reset automatically at <strong>midnight</strong> each day.</div>
</div>

<!-- ─────────── WEEKLY TAB ─────────── -->
<div id="tab-weekly" class="tab-content">
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="weekly-progress-text">0 / 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="weekly-progress-fill" style="width:0%"></div></div>
  </div>
  <div id="weekly-list"></div>
  <button class="add-section-btn" onclick="promptAddSection('weekly')">+ Add Section</button>
  <div class="reset-notice">Weekly items reset automatically on <strong>Sunday night</strong> (ready for Monday).</div>
</div>

<!-- ─────────── MODAL ─────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add Item</h2>
    <input type="text" id="modal-input" placeholder="Enter name…" />
    <div class="modal-btns">
      <button class="modal-cancel"  onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmModal()">Save</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  DEFAULT DATA
// ═══════════════════════════════════════════
const DEFAULT_DATA = {
  daily: [
    {
      id: 's1', type: 'section', label: "Must Do's",
      items: [
        { id: 'i1', name: 'Daily Prestart', answer: '', subs: [] },
        { id: 'i2', name: 'Daily Site Diary', note: '(From 3pm)', answer: '', subs: [
          { id: 'si1', name: 'Photos',                    answer: '' },
          { id: 'si2', name: 'Plant Usage',               answer: '' },
          { id: 'si3', name: 'People on Site (Work Hours)',answer: '' },
          { id: 'si4', name: 'Notes (as day goes)',        answer: '' },
        ]},
        { id: 'i3', name: 'Observations', note: '(ongoing)', answer: '', subs: [] },
      ]
    },
    {
      id: 's2', type: 'section', label: 'Daily Checks',
      items: [
        { id: 'i4', name: 'ITP', answer: '', subs: [
          { id: 'si5', name: 'CFA Piling',  answer: '' },
          { id: 'si6', name: 'Traffic TGS', answer: '' },
        ]},
        { id: 'i5', name: 'Surveyor Pile Set Out', note: '(Day Prior)', answer: '', subs: [] },
        { id: 'i6', name: 'Pile Schedule Checked Off', answer: '', subs: [] },
        { id: 'i7', name: 'Safety Items', answer: '', subs: [
          { id: 'si7',  name: 'House Keeping',                   answer: '' },
          { id: 'si8',  name: 'Exclusion Zones',                 answer: '' },
          { id: 'si9',  name: 'Lifting Gear Register',           answer: '' },
          { id: 'si10', name: 'Check Excavations (Battered etc.)',answer: '' },
          { id: 'si11', name: 'Bar Caps',                        answer: '' },
        ]},
      ]
    },
  ],
  weekly: [
    {
      id: 's3', type: 'section', label: "Must Do's",
      items: [
        { id: 'i8',  name: 'GWH Tool Box',          answer: '', subs: [] },
        { id: 'i9',  name: 'ITP – Worksite Checklist', answer: '', subs: [] },
        { id: 'i10', name: 'Job Safety Observation', answer: '', subs: [] },
      ]
    },
    {
      id: 's4', type: 'section', label: 'Weekly Checks',
      items: [
        { id: 'i11', name: 'Test and Tagging',            answer: '', subs: [] },
        { id: 'i12', name: 'Sammy Changed Evac Map',      answer: '', subs: [] },
        { id: 'i13', name: 'Sammy Done Nurse Call Checks', answer: '', subs: [] },
      ]
    },
  ]
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let data = { daily: [], weekly: [] };
let editMode = false;
let idCounter = 1000;

function newId() { return 'x' + (++idCounter); }

// ═══════════════════════════════════════════
//  PERSIST
// ═══════════════════════════════════════════
function todayKey() { return new Date().toISOString().slice(0,10); }
function weekKey() {
  const d = new Date(), day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return 'week-' + mon.toISOString().slice(0,10);
}

function saveAll() {
  localStorage.setItem('jsm-data',  JSON.stringify(data));
  localStorage.setItem('jsm-date',  todayKey());
  localStorage.setItem('jsm-week',  weekKey());
}

function loadAll() {
  const raw = localStorage.getItem('jsm-data');
  if (!raw) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    return;
  }
  data = JSON.parse(raw);

  const savedDate = localStorage.getItem('jsm-date');
  const savedWeek = localStorage.getItem('jsm-week');
  const resetDaily  = savedDate !== todayKey();
  const resetWeekly = savedWeek !== weekKey();

  if (resetDaily) {
    data.daily.forEach(sec => sec.items.forEach(item => {
      item.answer = '';
      (item.subs||[]).forEach(s => s.answer = '');
    }));
  }
  if (resetWeekly) {
    data.weekly.forEach(sec => sec.items.forEach(item => {
      item.answer = '';
      (item.subs||[]).forEach(s => s.answer = '');
    }));
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(tab) {
  const container = document.getElementById(tab + '-list');
  container.innerHTML = '';
  data[tab].forEach((sec, si) => {
    // Section heading
    const secRow = document.createElement('div');
    secRow.className = 'section-row';

    const delSecBtn = document.createElement('button');
    delSecBtn.className = 'delete-btn';
    delSecBtn.textContent = '−';
    delSecBtn.onclick = () => deleteSection(tab, si);

    const labelEl = document.createElement('span');
    labelEl.className = 'section-label-text';
    labelEl.textContent = sec.label;
    labelEl.onclick = () => { if (editMode) promptEditSection(tab, si); };

    secRow.appendChild(delSecBtn);
    secRow.appendChild(labelEl);
    container.appendChild(secRow);

    // Items
    sec.items.forEach((item, ii) => {
      const itemEl = buildItemEl(tab, si, ii, item);
      container.appendChild(itemEl);
    });

    // Add item button (edit mode)
    const addItemBtn = document.createElement('button');
    addItemBtn.className = 'add-btn';
    addItemBtn.textContent = '+ Add Item';
    addItemBtn.onclick = () => promptAddItem(tab, si);
    container.appendChild(addItemBtn);
  });

  updateProgress(tab);
}

function buildItemEl(tab, si, ii, item) {
  const row = document.createElement('div');
  row.className = 'item-row' + (item.answer === 'yes' ? ' done' : item.answer === 'na' ? ' na' : '');

  // Main row
  const main = document.createElement('div');
  main.className = 'item-main';

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = '−';
  delBtn.onclick = () => deleteItem(tab, si, ii);

  const nameSpan = document.createElement('span');
  nameSpan.className = 'item-name';
  nameSpan.innerHTML = item.name + (item.note ? ` <em style="font-size:0.78rem;color:var(--subtext);font-style:normal;">${item.note}</em>` : '');
  nameSpan.onclick = () => { if (editMode) promptEditItem(tab, si, ii); };

  const answerBtns = document.createElement('div');
  answerBtns.className = 'answer-btns';
  ['yes','no','na'].forEach(v => {
    const b = document.createElement('button');
    b.className = 'ans-btn ' + v + (item.answer === v ? ' active' : '');
    b.textContent = v === 'na' ? 'N/A' : v.charAt(0).toUpperCase() + v.slice(1);
    b.onclick = () => { if (!editMode) setAnswer(tab, si, ii, v); };
    answerBtns.appendChild(b);
  });

  main.appendChild(delBtn);
  main.appendChild(nameSpan);
  main.appendChild(answerBtns);
  row.appendChild(main);

  // Sub-items
  if (item.subs && item.subs.length > 0) {
    const subsWrap = document.createElement('div');
    subsWrap.className = 'sub-items';

    item.subs.forEach((sub, subi) => {
      const subEl = buildSubEl(tab, si, ii, subi, sub);
      subsWrap.appendChild(subEl);
    });

    const addSubBtn = document.createElement('button');
    addSubBtn.className = 'add-sub-btn';
    addSubBtn.textContent = '+ Add Sub-item';
    addSubBtn.onclick = () => promptAddSub(tab, si, ii);
    subsWrap.appendChild(addSubBtn);
    row.appendChild(subsWrap);
  } else {
    // still need add-sub-btn even with no subs
    const subsWrap = document.createElement('div');
    subsWrap.className = 'sub-items';
    subsWrap.style.display = 'none'; // hidden normally, shown in edit mode

    const addSubBtn = document.createElement('button');
    addSubBtn.className = 'add-sub-btn';
    addSubBtn.textContent = '+ Add Sub-item';
    addSubBtn.onclick = () => promptAddSub(tab, si, ii);
    subsWrap.appendChild(addSubBtn);
    row.appendChild(subsWrap);

    // show sub-items container in edit mode
    if (editMode) subsWrap.style.display = '';
  }

  return row;
}

function buildSubEl(tab, si, ii, subi, sub) {
  const el = document.createElement('div');
  el.className = 'sub-item' + (sub.answer === 'yes' ? ' done' : sub.answer === 'na' ? ' na' : '');

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = '−';
  delBtn.onclick = () => deleteSub(tab, si, ii, subi);

  const nameSpan = document.createElement('span');
  nameSpan.className = 'sub-name';
  nameSpan.textContent = sub.name;
  nameSpan.onclick = () => { if (editMode) promptEditSub(tab, si, ii, subi); };

  const subAns = document.createElement('div');
  subAns.className = 'sub-ans-btns';
  ['yes','no','na'].forEach(v => {
    const b = document.createElement('button');
    b.className = 'sub-ans-btn ' + v + (sub.answer === v ? ' active' : '');
    b.textContent = v === 'na' ? 'N/A' : v.charAt(0).toUpperCase() + v.slice(1);
    b.onclick = () => { if (!editMode) setSubAnswer(tab, si, ii, subi, v); };
    subAns.appendChild(b);
  });

  el.appendChild(delBtn);
  el.appendChild(nameSpan);
  el.appendChild(subAns);
  return el;
}

function renderAll() {
  render('daily');
  render('weekly');
}

// ═══════════════════════════════════════════
//  ANSWERS
// ═══════════════════════════════════════════
function setAnswer(tab, si, ii, val) {
  data[tab][si].items[ii].answer = val;
  saveAll();
  render(tab);
}
function setSubAnswer(tab, si, ii, subi, val) {
  data[tab][si].items[ii].subs[subi].answer = val;
  saveAll();
  render(tab);
}

// ═══════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════
function updateProgress(tab) {
  let total = 0, done = 0;
  data[tab].forEach(sec => sec.items.forEach(item => {
    total++;
    if (item.answer === 'yes' || item.answer === 'na') done++;
  }));
  document.getElementById(tab + '-progress-text').textContent = done + ' / ' + total;
  document.getElementById(tab + '-progress-fill').style.width = (total ? (done/total*100) : 0) + '%';
}

// ═══════════════════════════════════════════
//  EDIT MODE
// ═══════════════════════════════════════════
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('edit-toggle');
  btn.textContent = editMode ? 'Done' : 'Edit';
  btn.classList.toggle('done-mode', editMode);

  // show/hide sub-items containers that are empty
  renderAll();
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
let modalCallback = null;

function openModal(title, placeholder, defaultVal, cb) {
  document.getElementById('modal-title').textContent = title;
  const inp = document.getElementById('modal-input');
  inp.placeholder = placeholder;
  inp.value = defaultVal || '';
  modalCallback = cb;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => inp.focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCallback = null;
}

function confirmModal() {
  const val = document.getElementById('modal-input').value.trim();
  if (!val) return;
  if (modalCallback) modalCallback(val);
  closeModal();
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
// enter key confirms
document.getElementById('modal-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmModal();
});

// ═══════════════════════════════════════════
//  ADD / EDIT / DELETE
// ═══════════════════════════════════════════
function promptAddSection(tab) {
  openModal('Add Section', 'Section name…', '', name => {
    data[tab].push({ id: newId(), type: 'section', label: name, items: [] });
    saveAll();
    render(tab);
  });
}

function promptEditSection(tab, si) {
  openModal('Edit Section', 'Section name…', data[tab][si].label, name => {
    data[tab][si].label = name;
    saveAll();
    render(tab);
  });
}

function deleteSection(tab, si) {
  if (!confirm('Delete this entire section and all its items?')) return;
  data[tab].splice(si, 1);
  saveAll();
  render(tab);
}

function promptAddItem(tab, si) {
  openModal('Add Item', 'Item name…', '', name => {
    data[tab][si].items.push({ id: newId(), name, answer: '', subs: [] });
    saveAll();
    render(tab);
  });
}

function promptEditItem(tab, si, ii) {
  openModal('Edit Item', 'Item name…', data[tab][si].items[ii].name, name => {
    data[tab][si].items[ii].name = name;
    data[tab][si].items[ii].note = ''; // clear note on edit
    saveAll();
    render(tab);
  });
}

function deleteItem(tab, si, ii) {
  data[tab][si].items.splice(ii, 1);
  saveAll();
  render(tab);
}

function promptAddSub(tab, si, ii) {
  openModal('Add Sub-item', 'Sub-item name…', '', name => {
    if (!data[tab][si].items[ii].subs) data[tab][si].items[ii].subs = [];
    data[tab][si].items[ii].subs.push({ id: newId(), name, answer: '' });
    saveAll();
    render(tab);
  });
}

function promptEditSub(tab, si, ii, subi) {
  openModal('Edit Sub-item', 'Sub-item name…', data[tab][si].items[ii].subs[subi].name, name => {
    data[tab][si].items[ii].subs[subi].name = name;
    saveAll();
    render(tab);
  });
}

function deleteSub(tab, si, ii, subi) {
  data[tab][si].items[ii].subs.splice(subi, 1);
  saveAll();
  render(tab);
}

// ═══════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════
function switchTab(name) {
  ['daily','weekly'].forEach((t, i) => {
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active', t === name);
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
  });
}

// ═══════════════════════════════════════════
//  DATE LINE
// ═══════════════════════════════════════════
function updateDateLine() {
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('dateLine').textContent =
    new Date().toLocaleDateString('en-AU', opts);
}

// ═══════════════════════════════════════════
//  MIDNIGHT RESET
// ═══════════════════════════════════════════
function scheduleMidnightReset() {
  const now = new Date(), next = new Date(now);
  next.setHours(24,0,0,0);
  setTimeout(() => location.reload(), next - now);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
updateDateLine();
loadAll();
renderAll();
scheduleMidnightReset();
</script>
